# k8s_example.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: mcp
  labels:
    pod-security.kubernetes.io/enforce: baseline # Change if needed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uml-now-mcp-deployment
  namespace: mcp
spec:
  replicas: 3 # Adjust to your needs
  selector: 
    matchLabels:
      pod: uml-now-mcp
  template:
    metadata:
      labels:
        pod: uml-now-mcp
    spec:
      containers:
        - image: ghcr.io/umlcloudcomputing/uml-now-mcp:latest # Pin to a specific version if needed
          name: uml-now-mcp
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata: 
  name: uml-now-mcp-svc
  namespace: mcp
spec:
  selector:
    pod: uml-now-mcp
  internalTrafficPolicy: Cluster
  SessionAffinity: ClusterIP
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
